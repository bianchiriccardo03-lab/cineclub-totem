<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Drawing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 834px;
      height: 1194px;
      overflow: hidden;
      background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://picsum.photos/1920/1080?random=1') center/cover fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 150px;
    }

    canvas {
      display: block;
      width: 905px;
      height: 507px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      touch-action: none;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const CANVAS_WIDTH = 905;
    const CANVAS_HEIGHT = 507;
    const STROKE_WIDTH = 3;
    const ROUGHNESS = 2;

    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    // Funzione per disegnare con bordi frastagliati
    function drawRoughLine(fromX, fromY, toX, toY) {
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = STROKE_WIDTH;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Calcola la distanza tra i due punti
      const dx = toX - fromX;
      const dy = toY - fromY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.ceil(distance);

      // Disegna tratti multipli leggermente offset per creare effetto frastagliato
      for (let i = 0; i < steps; i++) {
        const t = steps > 1 ? i / steps : 0;
        const x = fromX + dx * t;
        const y = fromY + dy * t;

        // Aggiungi offset casuale per bordi frastagliati
        const offsetX = (Math.random() - 0.5) * ROUGHNESS;
        const offsetY = (Math.random() - 0.5) * ROUGHNESS;

        if (i === 0) {
          ctx.beginPath();
          ctx.moveTo(x + offsetX, y + offsetY);
        } else {
          ctx.lineTo(x + offsetX, y + offsetY);
        }
      }
      ctx.stroke();
    }

    // Eventi touch
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      lastX = touch.clientX - rect.left;
      lastY = touch.clientY - rect.top;
      isDrawing = true;
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!isDrawing) return;

      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;

      drawRoughLine(lastX, lastY, x, y);

      lastX = x;
      lastY = y;
    });

    canvas.addEventListener('touchend', () => {
      isDrawing = false;
    });

    // Eventi mouse (per il debugging/test su desktop)
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      lastX = e.clientX - rect.left;
      lastY = e.clientY - rect.top;
      isDrawing = true;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      drawRoughLine(lastX, lastY, x, y);

      lastX = x;
      lastY = y;
    });

    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
    });

    canvas.addEventListener('mouseleave', () => {
      isDrawing = false;
    });
  </script>
</body>
</html>
