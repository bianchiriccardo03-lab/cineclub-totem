<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Il Cinema in Piazza — Totem Canvas</title>
  <link rel="stylesheet" href="https://use.typekit.net/hoz8cuw.css">
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      font-family: 'sofia-pro', sans-serif;
      font-weight: 500;
      color: #111111;
    }

    #page {
      width: 1194px;
      height: 834px;
      margin: auto;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid #e8e8e8;
      position: relative;
    }

    .drawing-area {
      width: 1194px;
      height: 634px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #f5f5f5;
    }

    #drawingCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 1194px;
      height: 634px;
      touch-action: none;
      border-radius: 16px;
    }

    .bottom-bar {
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr;
      align-items: center;
      gap: 24px;
      padding: 20px 32px;
      background: #ffffff;
      border-top: 1px solid #f0f0f0;
    }

    .movie-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .movie-title {
      font-family: 'roca', sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.05;
    }

    .movie-meta {
      font-family: 'sofia-pro', sans-serif;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 500;
      color: #111111;
    }

    .actions-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 20px;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
    }

    .actions-pill button {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #111111;
      font-family: 'sofia-pro', sans-serif;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
      display: grid;
      place-items: center;
    }

    .actions-pill img {
      width: 28px;
      height: 28px;
      display: block;
    }

    .actions-pill button:hover,
    .actions-pill button:active {
      transform: scale(0.95);
      background: rgba(0,0,0,0.06);
    }

    .actions-pill button.is-disabled {
      pointer-events: none;
    }

    .actions-pill button.is-disabled img {
      opacity: 0.2;
    }

    .color-palette {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 12px 20px;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
    }

    .upload-spinner {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72px;
      height: 72px;
      margin: -36px 0 0 -36px;
      border: 6px solid rgba(255, 255, 255, 0.55);
      border-top-color: #111111;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .color-dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .color-dot.active {
      border-color: #222222;
    }

    .color-dot:active {
      transform: scale(0.95);
    }

    .footer {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 0 24px 24px;
      background: #ffffff;
      gap: 24px;
    }

    .footer-logo img {
      height: 80px;
      width: auto;
      display: block;
    }

    .footer-copy {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-left: auto;
    }

    .footer-text {
      font-family: 'sofia-pro', sans-serif;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 500;
      color: #111111;
      max-width: 300px;
    }

    .footer-text strong {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .qr-block {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      overflow: hidden;
      background: #f5f5f5;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    #qrCanvas {
      width: 80px;
      height: 80px;
      display: block;
    }

    button {
      cursor: pointer;
      outline: none;
      font-family: 'sofia-pro', sans-serif;
      font-weight: 500;
      background: none;
    }

    @media (max-width: 1193px) and (orientation: landscape) {
      html,
      body {
        width: 100vw;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }

      body {
        align-items: flex-start;
        justify-content: flex-start;
      }

      #page {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 12px;
        border: none;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px 16px;
        justify-content: stretch;
        align-content: stretch;
      }

      .drawing-area {
        grid-column: 1;
        grid-row: 1;
        width: 100%;
        height: auto;
        aspect-ratio: 1194 / 634;
        align-self: stretch;
        border-radius: 12px;
      }

      #drawingCanvas {
        width: 100%;
        height: 100%;
        border-radius: 12px;
      }

      .bottom-bar {
        display: contents;
      }

      .movie-info {
        grid-column: 1;
        grid-row: 2;
        align-self: center;
        justify-self: start;
        gap: 3px;
        max-width: calc(100% - 260px);
      }

      .movie-title {
        font-size: 22px;
        line-height: 1;
      }

      .movie-meta {
        font-size: 14px;
        line-height: 1.15;
      }

      .actions-pill {
        grid-column: 1;
        grid-row: 2;
        align-self: center;
        justify-self: end;
        gap: 8px;
        padding: 8px 14px;
      }

      .actions-pill button {
        width: 40px;
        height: 40px;
      }

      .actions-pill img {
        width: 24px;
        height: 24px;
      }

      .color-palette {
        grid-column: 2;
        grid-row: 1 / 3;
        align-self: start;
        justify-self: center;
        flex-direction: column;
        gap: 10px;
        padding: 10px 14px;
        margin-top: 64px;
      }

      .color-dot {
        width: 44px;
        height: 44px;
      }

      .color-dot.active {
        border-color: transparent;
        outline: 3px solid #222222;
      }

      .footer {
        grid-column: 2;
        grid-row: 1 / 3;
        align-self: start;
        justify-self: end;
        display: block;
        padding: 0;
        background: transparent;
        z-index: 2;
      }

      .footer-logo img {
        height: 50px;
      }

      .footer-copy {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="page">
    <div class="drawing-area">
      <canvas id="drawingCanvas" width="1194" height="634"></canvas>
      <div id="uploadSpinner" class="upload-spinner" aria-hidden="true"></div>
    </div>

    <div class="bottom-bar">
      <div class="movie-info">
        <div class="movie-title" id="movieTitle">8½</div>
        <div class="movie-meta" id="movieMeta">Federico Fellini - 1963</div>
      </div>

      <div class="actions-pill">
        <button id="clearButton" type="button" aria-label="Cancella tutto">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.483.0/icons/eraser.svg" alt="">
        </button>
        <button id="undoButton" type="button" aria-label="Undo">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.483.0/icons/rotate-ccw.svg" alt="">
        </button>
        <button id="redoButton" type="button" aria-label="Redo">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.483.0/icons/rotate-cw.svg" alt="">
        </button>
        <button id="saveButton" type="button" aria-label="Salva su Uploadcare">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.483.0/icons/upload.svg" alt="">
        </button>
      </div>

      <div class="color-palette" id="palette"></div>
    </div>

    <footer class="footer">
      <div class="footer-logo">
        <img src="logo.png" alt="Il Cinema in Piazza logo">
      </div>
      <div class="footer-copy">
        <div class="footer-text">
          <strong>TOCCA, CREA, PROIETTA.</strong>
          Scegli un colore, disegna il tuo frame <br> e guardalo vivere sul grande schermo.<br>Scansiona il QR Code per scoprire Cinema<br>in Piazza e scaricare l’app.
        </div>
        <div class="qr-block">
          <canvas id="qrCanvas" width="80" height="80"></canvas>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    const UPLOADCARE_PUBKEY = '5c6b9d160fe3ee2d6566';

    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const movieTitle = document.getElementById('movieTitle');
    const movieMeta = document.getElementById('movieMeta');
    const undoButton = document.getElementById('undoButton');
    const redoButton = document.getElementById('redoButton');
    const clearButton = document.getElementById('clearButton');
    const saveButton = document.getElementById('saveButton');
    const uploadSpinner = document.getElementById('uploadSpinner');
    const paletteEl = document.getElementById('palette');

    let filmsData = [];
    let currentFilm = null;
    let currentFrameImage = null;
    let currentFrameName = '';

    const paletteColors = ['#5B4FFF', '#FFB800', '#FD5996', '#00C97A', '#FF2F27'];
    let currentColor = paletteColors[0];
    let drawing = false;
    let lastPoint = null;
    let undoStack = [];
    let redoStack = [];
    const maxUndo = 10;

    function applyCanvasSettings() {
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.lineWidth = 4;
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
    }

    function saveSnapshot(stack) {
      try {
        const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        stack.push(snapshot);
        if (stack.length > maxUndo) stack.shift();
      } catch (error) {
        console.warn('Impossibile salvare snapshot', error);
      }
    }

    function updateRedoButton() {
      redoButton.classList.toggle('is-disabled', redoStack.length === 0);
      redoButton.setAttribute('aria-disabled', String(redoStack.length === 0));
    }

    function setColor(color) {
      currentColor = color;
      ctx.strokeStyle = currentColor;
      document.querySelectorAll('.color-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.color === color);
      });
    }

    function createPalette() {
      paletteColors.forEach(color => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'color-dot';
        button.dataset.color = color;
        button.style.backgroundColor = color;
        button.setAttribute('aria-label', `Seleziona colore ${color}`);
        if (color === currentColor) button.classList.add('active');
        button.addEventListener('click', () => setColor(color));
        paletteEl.appendChild(button);
      });
    }

    function updateMovieInfo() {
      if (currentFilm) {
        movieTitle.textContent = currentFilm.titolo;
        movieMeta.textContent = `${currentFilm.autore} - ${currentFilm.anno}`;
      }
    }

    function drawImageCover(image) {
      const canvasRatio = canvas.width / canvas.height;
      const imageRatio = image.width / image.height;
      let sx = 0;
      let sy = 0;
      let sWidth = image.width;
      let sHeight = image.height;

      if (imageRatio > canvasRatio) {
        sWidth = image.height * canvasRatio;
        sx = (image.width - sWidth) / 2;
      } else {
        sHeight = image.width / canvasRatio;
        sy = (image.height - sHeight) / 2;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
    }

    async function loadFilmsData() {
      try {
        const response = await fetch('films.json');
        filmsData = await response.json();
      } catch (error) {
        console.error('Errore nel caricamento di films.json', error);
      }
    }

    async function loadRandomFrameForFilm(film) {
      if (typeof film.frameMin !== 'number' || typeof film.frameMax !== 'number') {
        console.error('film.frameMin o film.frameMax non definito per', film.cartella);
        return;
      }

      const maxAttempts = 10;
      const range = film.frameMax - film.frameMin + 1;
      if (range <= 0) {
        console.error('frameMax deve essere maggiore o uguale a frameMin per', film.cartella);
        return;
      }

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const frameNumber = Math.floor(Math.random() * range) + film.frameMin;
        const frameName = `${film.cartella}/Sequence ${String(frameNumber).padStart(5, '0')}.jpg`;
        try {
          const image = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('Image failed to load'));
            img.src = frameName;
          });
          currentFrameImage = image;
          currentFrameName = frameName;
          redoStack = [];
          updateRedoButton();
          drawImageCover(image);
          saveSnapshot(undoStack);
          updateMovieInfo();
          return;
        } catch (error) {
          // Prova un altro frame casuale
        }
      }
      console.log('Nessun frame trovato per', film.cartella);
    }

    async function loadRandomFrame() {
      if (filmsData.length === 0) return;
      const randomFilm = filmsData[Math.floor(Math.random() * filmsData.length)];
      currentFilm = randomFilm;
      await loadRandomFrameForFilm(randomFilm);
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const touch = event.touches && event.touches[0];
      const clientX = touch ? touch.clientX : event.clientX;
      const clientY = touch ? touch.clientY : event.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function jitter(value) {
      return value + (Math.random() * 1.5 - 0.75);
    }

    function beginDrawing(event) {
      if (event.target !== canvas) return;
      if (event.type === 'mousedown' && event.button !== 0) return;
      event.preventDefault();
      saveSnapshot(undoStack);
      redoStack = [];
      updateRedoButton();
      drawing = true;
      lastPoint = pointerPosition(event);
      ctx.beginPath();
      ctx.moveTo(jitter(lastPoint.x), jitter(lastPoint.y));
    }

    function draw(event) {
      if (!drawing) return;
      event.preventDefault();
      const point = pointerPosition(event);
      ctx.lineTo(jitter(point.x), jitter(point.y));
      ctx.stroke();
      lastPoint = point;
    }

    function endDrawing(event) {
      if (!drawing) return;
      event.preventDefault();
      drawing = false;
      ctx.closePath();
      lastPoint = null;
    }

    function undo() {
      const snapshot = undoStack.pop();
      if (!snapshot) return;
      saveSnapshot(redoStack);
      ctx.putImageData(snapshot, 0, 0);
      updateRedoButton();
    }

    function redo() {
      const snapshot = redoStack.pop();
      if (!snapshot) return;
      saveSnapshot(undoStack);
      ctx.putImageData(snapshot, 0, 0);
      updateRedoButton();
    }

    function clearCanvas() {
      saveSnapshot(undoStack);
      redoStack = [];
      updateRedoButton();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (currentFrameImage) {
        drawImageCover(currentFrameImage);
      }
    }

    function getUploadFileName() {
      const now = new Date();
      const pad = value => String(value).padStart(2, '0');
      const date = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const backgroundName = currentFrameName ? currentFrameName.split('/').pop() : 'totem-canvas.jpg';
      const baseName = backgroundName.replace(/\.[^/.]+$/, '');
      return `${baseName}_${date}.png`;
    }

    function setUploading(isUploading) {
      uploadSpinner.style.display = isUploading ? 'block' : 'none';
    }

    async function uploadCanvasToUploadcare() {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      if (!blob) {
        console.error('Impossibile generare il file per l’upload.');
        return;
      }

      const fileName = getUploadFileName();
      const formData = new FormData();
      formData.append('UPLOADCARE_PUB_KEY', UPLOADCARE_PUBKEY);
      formData.append('UPLOADCARE_STORE', '1');
      formData.append('file', blob, fileName);

      setUploading(true);
      try {
        const response = await fetch('https://upload.uploadcare.com/base/', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        if (!response.ok) {
          console.error(`Uploadcare upload fallito: ${result.error || 'errore sconosciuto'}`);
          return;
        }

        console.log('Uploadcare file caricato:', result.file);
        await loadRandomFrame();
      } catch (error) {
        console.error('Errore di rete durante l’upload su Uploadcare.', error);
      } finally {
        setUploading(false);
      }
    }

    function initQRCode() {
      const qrCanvas = document.getElementById('qrCanvas');
      if (window.QRCode) {
        QRCode.toCanvas(qrCanvas, 'https://example.com', { width: 80, margin: 0 }, error => {
          if (error) console.error(error);
        });
      }
    }

    function initBlockingOutsideCanvas() {
      document.addEventListener('mousedown', event => {
        if (!canvas.contains(event.target) && !event.target.closest('button') && !event.target.closest('.color-dot')) {
          event.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('touchstart', event => {
        if (!canvas.contains(event.target) && !event.target.closest('button') && !event.target.closest('.color-dot')) {
          event.preventDefault();
        }
      }, { passive: false });
    }

    async function init() {
      await loadFilmsData();
      applyCanvasSettings();
      createPalette();
      await loadRandomFrame();
      initQRCode();

      canvas.addEventListener('mousedown', beginDrawing);
      canvas.addEventListener('mousemove', draw);
      window.addEventListener('mouseup', endDrawing);
      canvas.addEventListener('touchstart', beginDrawing, { passive: false });
      canvas.addEventListener('touchmove', draw, { passive: false });
      window.addEventListener('touchend', endDrawing, { passive: false });
      window.addEventListener('touchcancel', endDrawing, { passive: false });

      undoButton.addEventListener('click', undo);
      redoButton.addEventListener('click', redo);
      clearButton.addEventListener('click', clearCanvas);
      saveButton.addEventListener('click', uploadCanvasToUploadcare);
      updateRedoButton();
      initBlockingOutsideCanvas();
    }

    init();
  </script>
</body>
</html>
